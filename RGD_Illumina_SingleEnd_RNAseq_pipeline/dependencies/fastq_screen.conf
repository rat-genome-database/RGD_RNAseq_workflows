############
# Drosophila
DATABASE	Drosophila	/path/to/your/FastQ_Screen_Genomes/Drosophila/BDGP6



#########
## Worm
DATABASE	Worm	/path/to/your/FastQ_Screen_Genomes/Worm/Caenorhabditis_elegans.WBcel235



#########
## Yeast - sequence available from
## ftp://ftp.ensembl.org/pub/current/fasta/saccharomyces_cerevisiae/dna/
DATABASE	Yeast	/path/to/your/FastQ_Screen_Genomes/Yeast/Saccharomyces_cerevisiae.R64-1-1



#########
## Arabidopsis - sequences available from 
DATABASE	Arabidopsis	     /path/to/your/FastQ_Screen_Genomes/Arabidopsis/Arabidopsis_thaliana.TAIR10



#########
## Ecoli
## Sequence available from EMBL accession U00096.2
DATABASE	Ecoli	/path/to/your/FastQ_Screen_Genomes/E_coli/Ecoli



##########
##rRNA - In house custom database
DATABASE rRNA /path/to/your/FastQ_Screen_Genomes/rRNA/GRCm38_rRNA 
 


##############
# Mitochondria
DATABASE	MT	/path/to/your/FastQ_Screen_Genomes/Mitochondria/mitochondria



########
## PhiX - sequence available from Refseq accession NC_001422.1
DATABASE	PhiX	     /path/to/your/FastQ_Screen_Genomes/PhiX/phi_plus_SNPs



##############
# Lambda
DATABASE Lambda	/path/to/your/FastQ_Screen_Genomes/Lambda/Lambda



##########
## Vector - Sequence taken from the UniVec database
## http://www.ncbi.nlm.nih.gov/VecScreen/UniVec.html
DATABASE	Vectors	/path/to/your/FastQ_Screen_Genomes/Vectors/Vectors



############
## Adapters - sequence derived from the FastQC contaminats file
## www.bioinformatics.bbsrc.ac.uk/projects/fastqc/
DATABASE	Adapters	/path/to/your/FastQ_Screen_Genomes/Adapters/Contaminants
